syntax = "proto3";

package order;

// 🚀 FIXED: Point path directly to proto/order to match your exact repository structure
option go_package = "github.com/mafi020/ecom-golang-micro/proto/order;orderpb";

import "google/protobuf/timestamp.proto";

service OrderService {
  rpc Checkout (CheckoutRequest) returns (CheckoutResponse);
  rpc GetOrder (GetOrderRequest) returns (GetOrderResponse);
  rpc GetOrders (GetOrdersRequest) returns (GetOrdersResponse);
  rpc UpdateStatus (UpdateStatusRequest) returns (UpdateStatusResponse);
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_CONFIRMED = 2;
  ORDER_STATUS_PAID = 3;
  ORDER_STATUS_SHIPPED = 4;
  ORDER_STATUS_DELIVERED = 5;
  ORDER_STATUS_COMPLETED = 6;
  ORDER_STATUS_CANCELLED = 7;
}

message OrderItem {
  int64 id = 1;
  int64 order_id = 2;
  int64 product_id = 3;
  int32 quantity = 4;
  int64 price_cents = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Order {
  int64 id = 1;
  int64 user_id = 2;
  OrderStatus status = 3;
  int64 total_price = 4;

  optional string courier_partner = 5;
  optional string tracking_number = 6;
  
  // 🚀 FIXED: Marked as 'optional' to generate as pointers in Go, matching *time.Time
  optional google.protobuf.Timestamp shipped_at = 7;
  optional google.protobuf.Timestamp delivered_at = 8;

  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  
  repeated OrderItem order_items = 11;
}

message CheckoutRequest {
  int64 user_id = 1;
}

message CheckoutResponse {
  Order order = 1;
}

message GetOrderRequest {
  int64 id = 1;
  int64 user_id = 2;
}

message GetOrderResponse {
  Order order = 1;
}

message GetOrdersRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 limit = 3;
  optional string status = 4;
}

message GetOrdersResponse {
  repeated Order orders = 1;
  int32 total_count = 2;
}

message UpdateStatusRequest {
  int64 order_id = 1;
  OrderStatus status = 2;
}

message UpdateStatusResponse {
  OrderStatus updated_status = 1;
}
