root = "."
testdata_dir = "testdata"
tmp_dir = "bin"

[build]
  args_bin = []
  bin = "./bin/api-gateway.exe"
  cmd = "go build -o ./bin/api-gateway.exe ./cmd/api-gateway/main.go"
  delay = 1000
  exclude_dir = ["assets", "bin", "vendor", "cmd/monolith", "migrations"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd/api-gateway", "internal/gateway", "config"]
  include_ext = ["go", "toml"]
  include_file = []
  kill_delay = "0s"
  log = "bin/build-gateway-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[log]
  main_only = false
  time = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
