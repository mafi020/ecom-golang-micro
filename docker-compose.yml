services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: ecom-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbitmq deprecated_features.permit.management_metrics_collection
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecom_mesh

  ecom-postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${PG_SHARED_USER:-postgres}
      - POSTGRES_PASSWORD=${PG_SHARED_PASSWORD:-password}
      - POSTGRES_DB=ecom_main
      - POSTGRES_MULTIPLE_DATABASES=ecom_identity,ecom_catalog,ecom_cart,ecom_order,ecom_payment
    volumes:
      - ecom_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    command: postgres -c shared_buffers=64MB -c max_connections=50 -c work_mem=4MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_main"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecom_mesh

  # ── GO MICROSERVICES ──
  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        SERVICE_PATH: identity-service
    container_name: ecom-identity-service
    ports:
      - "${IDENTITY_SERVICE_HTTP_PORT}:${IDENTITY_SERVICE_HTTP_PORT}"
      - "${IDENTITY_SERVICE_GRPC_PORT}:${IDENTITY_SERVICE_GRPC_PORT}"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - SERVICE_PATH=identity-service
      - GOFLAGS=-p=1
      # Explicitly mapping all database context elements to container spaces
      - PG_IDENTITY_HOST=ecom-postgres
      - PG_IDENTITY_PORT=5432
      - PG_IDENTITY_USER=${PG_IDENTITY_USER}
      - PG_IDENTITY_PASSWORD=${PG_IDENTITY_PASSWORD}
      - PG_IDENTITY_DB_NAME=${PG_IDENTITY_DB_NAME}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@ecom-rabbitmq:5672/
    depends_on:
      ecom-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ecom_mesh]

  catalog-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        SERVICE_PATH: catalog-service
    container_name: ecom-catalog-service
    ports:
      - "${CATALOG_SERVICE_HTTP_PORT}:${CATALOG_SERVICE_HTTP_PORT}"
      - "${CATALOG_SERVICE_GRPC_PORT}:${CATALOG_SERVICE_GRPC_PORT}"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - SERVICE_PATH=catalog-service
      - GOFLAGS=-p=1
      # Explicitly mapping all database context elements to container spaces
      - PG_CATALOG_HOST=ecom-postgres
      - PG_CATALOG_PORT=5432
      - PG_CATALOG_USER=${PG_CATALOG_USER}
      - PG_CATALOG_PASSWORD=${PG_CATALOG_PASSWORD}
      - PG_CATALOG_DB_NAME=${PG_CATALOG_DB_NAME}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@ecom-rabbitmq:5672/
    depends_on:
      ecom-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ecom_mesh]

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        SERVICE_PATH: cart-service
    container_name: ecom-cart-service
    ports:
      - "${CART_SERVICE_HTTP_PORT}:${CART_SERVICE_HTTP_PORT}"
      - "${CART_SERVICE_GRPC_PORT}:${CART_SERVICE_GRPC_PORT}"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - SERVICE_PATH=cart-service
      - GOFLAGS=-p=1
      # Explicitly mapping all database context elements to container spaces
      - PG_CART_HOST=ecom-postgres
      - PG_CART_PORT=5432
      - PG_CART_USER=${PG_CART_USER}
      - PG_CART_PASSWORD=${PG_CART_PASSWORD}
      - PG_CART_DB_NAME=${PG_CART_DB_NAME}
      - CATALOG_GRPC_ADDR=ecom-catalog-service:${CATALOG_SERVICE_GRPC_PORT}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@ecom-rabbitmq:5672/
    depends_on:
      ecom-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_started
    networks: [ecom_mesh]

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        SERVICE_PATH: order-service
    container_name: ecom-order-service
    ports:
      - "${ORDER_SERVICE_HTTP_PORT}:${ORDER_SERVICE_HTTP_PORT}"
      - "${ORDER_SERVICE_GRPC_PORT}:${ORDER_SERVICE_GRPC_PORT}"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - SERVICE_PATH=order-service
      - GOFLAGS=-p=1
      # Explicitly mapping all database context elements to container spaces
      - PG_ORDER_HOST=ecom-postgres
      - PG_ORDER_PORT=5432
      - PG_ORDER_USER=${PG_ORDER_USER}
      - PG_ORDER_PASSWORD=${PG_ORDER_PASSWORD}
      - PG_ORDER_DB_NAME=${PG_ORDER_DB_NAME}
      - CATALOG_GRPC_ADDR=ecom-catalog-service:${CATALOG_SERVICE_GRPC_PORT}
      - CART_GRPC_ADDR=ecom-cart-service:${CART_SERVICE_GRPC_PORT}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@ecom-rabbitmq:5672/
    depends_on:
      ecom-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_started
      cart-service:
        condition: service_started
    networks: [ecom_mesh]

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        SERVICE_PATH: payment-service
    container_name: ecom-payment-service
    ports:
      - "${PAYMENT_SERVICE_HTTP_PORT}:${PAYMENT_SERVICE_HTTP_PORT}"
      - "${PAYMENT_SERVICE_GRPC_PORT}:${PAYMENT_SERVICE_GRPC_PORT}"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - SERVICE_PATH=payment-service
      - GOFLAGS=-p=1
      # Explicitly mapping all database context elements to container spaces
      - PG_PAYMENT_HOST=ecom-postgres
      - PG_PAYMENT_PORT=5432
      - PG_PAYMENT_USER=${PG_PAYMENT_USER}
      - PG_PAYMENT_PASSWORD=${PG_PAYMENT_PASSWORD}
      - PG_PAYMENT_DB_NAME=${PG_PAYMENT_DB_NAME}
      - ORDER_GRPC_ADDR=ecom-order-service:${ORDER_SERVICE_GRPC_PORT}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@ecom-rabbitmq:5672/
    depends_on:
      ecom-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      order-service:
        condition: service_started
    networks: [ecom_mesh]

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        SERVICE_PATH: api-gateway
    container_name: ecom-api-gateway
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - SERVICE_PATH=api-gateway
      - GOFLAGS=-p=1
      - IDENTITY_SERVICE_URL=http://ecom-identity-service:${IDENTITY_SERVICE_HTTP_PORT}
      - CATALOG_SERVICE_URL=http://ecom-catalog-service:${CATALOG_SERVICE_HTTP_PORT}
      - CART_SERVICE_URL=http://ecom-cart-service:${CART_SERVICE_HTTP_PORT}
      - ORDER_SERVICE_URL=http://ecom-order-service:${ORDER_SERVICE_HTTP_PORT}
      - PAYMENT_SERVICE_URL=http://ecom-payment-service:${PAYMENT_SERVICE_HTTP_PORT}
    depends_on:
      - identity-service
      - catalog-service
      - cart-service
      - order-service
      - payment-service
    networks: [ecom_mesh]

networks:
  ecom_mesh:
    driver: bridge

volumes:
  rabbitmq_data:
  ecom_postgres_data:
